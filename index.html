<!doctype html>
<html lang="en">
  <head>
    <!-- Configuration de l'encodage des caractères -->
    <meta charset="UTF-8" />
    
    <!-- Icône de l'application (favicon) -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- Configuration pour les appareils mobiles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Titre de la page qui apparaît dans l'onglet du navigateur -->
    <title>Vite + Svelte</title>
  </head>
  <body>
    <!-- Élément racine où l'application Svelte sera montée -->
    <!-- L'id 'app' est utilisé dans main.js pour cibler cet élément -->
    <div id="app"></div>
    
    <!-- Chargement du script principal de l'application -->
    <!-- Le type="module" indique que c'est un module ES6 -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
